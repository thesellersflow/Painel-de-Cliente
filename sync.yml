name: Sync Painel SellersFlow

on:
  schedule:
    - cron: '0 * * * *'   # toda hora
  workflow_dispatch:        # botão manual no GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests google-auth google-api-python-client

      - name: Run sync
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python sync.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Nada para commitar" && exit 0
          git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
