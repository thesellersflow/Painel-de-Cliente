name: Sync Painel SellersFlow

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-api-python-client google-auth

      - name: Run sync script
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python sync.py

      - name: Commit and push data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SellersFlow Sync Bot"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar"
            exit 0
          fi
          git commit -m "🔄 Auto-sync data.json"
          git pull --rebase origin main
          git push
